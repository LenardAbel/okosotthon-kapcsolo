<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okosotthon Vezérlő</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-blue: #3498db;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
            --input-bg: #111;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 90%;
            max-width: 360px;
            border: 1px solid #2a2a2a;
        }

        h2 { 
            margin-bottom: 35px; 
            font-weight: 300; 
            letter-spacing: 1px;
            color: #fff;
        }

        /* Beviteli mező stílusa */
        input[type="password"] { 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: var(--input-bg); 
            color: white; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        /* Gombok alapstílusa */
        button { 
            padding: 16px 20px; 
            font-size: 15px; 
            cursor: pointer; 
            margin: 10px 0; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-connect { background: var(--primary-blue); color: white; }
        .btn-on { background: var(--success-green); color: white; }
        .btn-off { background: var(--danger-red); color: white; }
        
        button:active { transform: scale(0.97); opacity: 0.85; }

        /* Kifinomult jelszó törlés gomb */
        .btn-logout {
            margin-top: 35px;
            padding: 8px 15px;
            background: transparent;
            color: #555;
            border: 1px solid #2a2a2a;
            font-size: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: auto;
            display: inline-block;
        }

        .btn-logout:hover {
            color: var(--danger-red);
            border-color: var(--danger-red);
            background: rgba(231, 76, 60, 0.05);
        }

        /* Állapotjelző sáv */
        #status { 
            margin-top: 30px; 
            font-size: 11px; 
            padding: 8px; 
            border-radius: 8px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .offline { background: #2a1515; color: #ff8888; }
        .online { background: #152a15; color: #88ff88; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vezérlőpult</h2>
    
    <div id="login-section">
        <input type="password" id="pass-input" placeholder="Vezérlő jelszó">
        <button class="btn-connect" onclick="connect()">Csatlakozás</button>
    </div>

    <div id="control-section" class="hidden">
        <button class="btn-on" onclick="sendMsg('ON')">Bekapcsolás</button>
        <button class="btn-off" onclick="sendMsg('OFF')">Kikapcsolás</button>
        
        <div>
            <button class="btn-logout" onclick="logout()">Mentett jelszó törlése</button>
        </div>
    </div>

    <div id="status" class="offline">Állapot: Leválasztva</div>
</div>

<script>
    let client;
    const brokerUrl = 'wss://e145f29913884d19aa18d2082941f151.s1.eu.hivemq.cloud:8884/mqtt';

    // Automatikus belépés kezelése oldalbetöltéskor
    window.onload = function() {
        const savedPass = localStorage.getItem('mqtt_secret');
        if (savedPass) {
            document.getElementById('pass-input').value = savedPass;
            connect();
        }
    };

    function connect() {
        const userPass = document.getElementById('pass-input').value;
        if (!userPass) return;

        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Csatlakozás...";

        // Kapcsolódás a HiveMQ-hoz
        client = mqtt.connect(brokerUrl, {
            username: 'mqttvok', 
            password: userPass,
            connectTimeout: 5000,
            keepalive: 60
        });

        client.on('connect', () => {
            // Siker esetén elmentjük a jelszót helyben
            localStorage.setItem('mqtt_secret', userPass);
            
            // Panelek váltása
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('control-section').classList.remove('hidden');
            
            statusDiv.innerText = "Állapot: ONLINE";
            statusDiv.className = "online";
        });

        client.on('error', (err) => {
            console.error(err);
            localStorage.removeItem('mqtt_secret');
            alert("Hiba! Rossz jelszó vagy szerverhiba.");
            location.reload();
        });

        client.on('close', () => {
            statusDiv.innerText = "Állapot: Leválasztva";
            statusDiv.className = "offline";
        });
    }

    // Üzenetküldés a topic-ra
    function sendMsg(val) {
        if (client && client.connected) {
            client.publish('otthon/nappali/konnektor/set', val, { qos: 1 });
            // Pici rezgés visszajelzés mobilokon
            if (navigator.vibrate) navigator.vibrate(40);
        } else {
            alert("Nincs aktív kapcsolat!");
        }
    }

    // Jelszó törlése az eszköz memóriájából
    function logout() {
        if(confirm("Biztosan törlöd a mentett jelszót erről az eszközről?")) {
            localStorage.removeItem('mqtt_secret');
            location.reload();
        }
    }
</script>

</body>
</html>

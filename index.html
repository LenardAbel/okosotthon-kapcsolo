<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konnektor Teszt</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #222; color: white; }
        .card { background: #333; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-on { background: #2ecc71; color: white; }
        .btn-off { background: #e74c3c; color: white; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 14px; padding: 10px; border-radius: 5px; }
        .online { background: #1b5e20; color: #a5d6a7; }
        .offline { background: #b71c1c; color: #ef9a9a; }
    </style>
</head>
<body>

<div class="card">
    <h2>Xiaomi Konnektor Vezérlő</h2>
    <button class="btn-on" onclick="sendMsg('ON')">BEKAPCSOL</button>
    <button class="btn-off" onclick="sendMsg('OFF')">KIKAPCSOL</button>
    <div id="status" class="offline">Csatlakozás folyamatban...</div>
</div>

<script>
    // 1. Megkérdezzük a jelszót a felhasználótól
    const userPass = prompt("Add meg a vezérlő jelszót:");

    if (userPass) {
        const broker = 'wss://e145f29913884d19aa18d2082941f151.s1.eu.hivemq.cloud:8884/mqtt'; 
        const options = {
            username: 'mqttvok', 
            password: userPass // A beírt jelszót használjuk
        };

        const client = mqtt.connect(broker, options);

        client.on('connect', () => {
            console.log("Sikeresen csatlakozva!");
            document.body.style.backgroundColor = "#e7ffe7"; // Zöldes háttér, ha oké
        });

        client.on('error', (err) => {
            alert("Hiba a csatlakozásnál! Rossz jelszó?");
        });

        function send(val) {
            client.publish('otthon/nappali/konnektor/set', val, { qos: 1 });
        }
    } else {
        alert("Jelszó nélkül nem tudsz csatlakozni.");
    }
</script>


</body>
</html>
